x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE_COMMUNITY}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - ./scripts/init-extra-databases.sql:/docker-entrypoint-initdb.d/init-extra-databases.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - community-network
    restart: always
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    expose:
      - "6379"
    networks:
      - community-network
    restart: always
    logging: *default-logging

  mongodb:
    image: mongo:6.0
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    expose:
      - "27017"
    networks:
      - community-network
    restart: always
    logging: *default-logging

  community-web-next:
    build:
      context: ../../../apps/community_web_next
    environment:
      - PORT=3000
      - ACW_API_SERVER_URL=http://drf:8000/api
      - ACW_API_PROXY_TARGET=http://drf:8000
      - NEXT_PUBLIC_DRF_URL=
    expose:
      - "3000"
    depends_on:
      - drf
    networks:
      - community-network
      - traefik-network
    restart: always
    logging: *default-logging

  drf:
    depends_on:
      postgres:
        condition: service_healthy
      hd-api-key-generator:
        condition: service_started
    environment:
      - WALLET_SERVICE_URL=http://hdwallet-service:8000
      - WALLET_API_KEY_FILE=/api_key/wallet_api_key.txt
    expose:
      - "8000"
    networks:
      - community-network
      - traefik-network
    restart: always
    logging: *default-logging

  celery-worker:
    networks:
      - community-network
    restart: always
    logging: *default-logging

  celery-beat:
    networks:
      - community-network
    restart: always
    logging: *default-logging

  news-core:
    networks:
      - community-network
    restart: always
    logging: *default-logging

  info-core:
    networks:
      - community-network
    restart: always
    logging: *default-logging

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    networks:
      - community-network
    restart: always
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/${MINIO_BUCKET_NAME} --ignore-existing;
      mc anonymous set download local/${MINIO_BUCKET_NAME};
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    networks:
      - community-network
    logging: *default-logging

  hdwallet-service:
    container_name: hdwallet-service
    environment:
      - MNEMONIC_FILE=/run/secrets/hd_mnemonic
      - WALLET_API_KEY_FILE=/api_key/wallet_api_key.txt
      - TRON_GRID_API_KEY=${TRON_GRID_API_KEY}
    secrets:
      - hd_mnemonic
    networks:
      - community-network
    depends_on:
      - hd-api-key-generator
      - drf
    logging: *default-logging

  hd-api-key-generator:
    container_name: hd-api-key-generator
    image: alpine:latest
    command: sh -c "mkdir -p /api_key && [ -f /api_key/wallet_api_key.txt ] || head -c 32 /dev/urandom | base64 > /api_key/wallet_api_key.txt"
    networks:
      - community-network
    deploy:
      replicas: 1
    logging: *default-logging

secrets:
  hd_mnemonic: {}

networks:
  community-network:
    driver: bridge
  traefik-network:
    external: true
