services:
  postgres:
    container_name: prod-community-postgres
    expose:
      - "5432"
    volumes:
      - ${HOME}/prod-community-postgres/data/:/var/lib/postgresql/data/

  redis:
    container_name: prod-community-redis
    expose:
      - "6379"
    volumes:
      - ${HOME}/prod-community-redis/data/:/data/
      - ${HOME}/prod-community-redis/conf/redis.conf:/etc/redis/redis.conf

  mongodb:
    container_name: prod-community-mongodb
    expose:
      - "27017"
    volumes:
      - ${HOME}/prod-community-mongodb/data/:/data/

  community-web-next:
    image: community-web-next
    container_name: prod-community-web-next
    environment:
      - NEXT_PUBLIC_SITE_URL=https://arbicrypto.net
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_DRF_URL=https://arbicrypto.net/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.acw-web.rule=Host(`arbicrypto.net`)"
      - "traefik.http.routers.acw-web.entrypoints=websecure"
      - "traefik.http.routers.acw-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.acw-web.loadbalancer.server.port=3000"

  drf:
    image: community-drf
    container_name: prod-community-drf
    volumes:
      - ${HOME}/prod-community-drf/static:/opt/community_drf/static
      - ${HOME}/prod-community-drf/media:/opt/community_drf/media
      - ${HOME}/prod-community-apikey:/api_key:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.acw-api.rule=Host(`arbicrypto.net`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.acw-api.entrypoints=websecure"
      - "traefik.http.routers.acw-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.acw-api.loadbalancer.server.port=8000"

  celery-worker:
    image: community-celery-worker
    command: celery -A config worker -l INFO
    container_name: prod-community-celery-worker
    volumes:
      - ${HOME}/prod-community-drf/media:/opt/community_drf/media

  celery-beat:
    image: community-celery-beat
    command: celery -A config beat -l INFO
    container_name: prod-community-celery-beat
    volumes:
      - ${HOME}/prod-community-drf/media:/opt/community_drf/media

  news-core:
    image: news-core
    container_name: prod-news-core

  info-core:
    image: info-core
    container_name: prod-info-core
    volumes:
      - ${HOME}/prod-info-core/logs:/home/info_core/info_core/loggers/logs

  minio:
    container_name: prod-community-minio
    volumes:
      - ${HOME}/prod-community-minio/data:/data

  minio-init:
    container_name: prod-community-minio-init

  hdwallet-service:
    image: hdwallet-service
    volumes:
      - ${HOME}/prod-community-apikey:/api_key:ro

  hd-api-key-generator:
    volumes:
      - ${HOME}/prod-community-apikey:/api_key

secrets:
  hd_mnemonic:
    file: ${HOME}/prod-community-secrets/hd_mnemonic.txt

networks:
  community-network:
    name: prod-community-network
  traefik-network:
    external: true
