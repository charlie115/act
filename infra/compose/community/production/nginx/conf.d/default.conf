upstream docker-drf {
    server drf:8000;
}

upstream community-web-next {
    server community-web-next:3000;
}

server {
    listen 80;
    server_name arbicrypto.net;

    # Serve the ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name arbicrypto.net;

    client_max_body_size 100M;

    gzip on;
    gzip_disable "msie6";
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;
    gzip_comp_level 6;

    location / {
        proxy_pass http://community-web-next;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://docker-drf/api/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        # Timeout settings
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        # proxy_redirect off;
    }

    location /api/static/ {
        alias /opt/community_drf/static/;
        autoindex off;
    }

    location /api/media/ {
        alias /opt/community_drf/media/;
        autoindex off;
    }

    ssl_certificate /etc/letsencrypt/live/arbicrypto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arbicrypto.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}
