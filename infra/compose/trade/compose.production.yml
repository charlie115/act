services:
  trade-postgres:
    container_name: trade-postgres
    volumes:
      - ${HOME}/prod-trade-postgres/data/:/var/lib/postgresql/data/

  trade-core-api:
    image: trade-core-api
    container_name: prod-trade-core-api
    volumes:
      - ${HOME}/prod-trade-core-api/logs:/home/trade_core/trade_core/loggers/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trade-api.rule=Host(`arbicrypto.net`) && PathPrefix(`/trade-api/`)"
      - "traefik.http.routers.trade-api.entrypoints=websecure"
      - "traefik.http.routers.trade-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.trade-api.middlewares=trade-ip-allowlist@file"
      - "traefik.http.services.trade-api.loadbalancer.server.port=8000"

  trade-core:
    image: trade-core
    container_name: prod-trade-core
    volumes:
      - ${HOME}/prod-trade-core/logs:/home/trade_core/trade_core/loggers/logs

networks:
  trade-network:
    name: prod-trade-network
  traefik-network:
    external: true

