services:
  trade-postgres:
    container_name: test-trade-postgres
    volumes:
      - ${HOME}/test-trade-postgres/data/:/var/lib/postgresql/data/

  trade-core-api:
    image: trade-core-api:test
    container_name: test-trade-core-api
    volumes:
      - ${HOME}/test-trade-core-api/logs:/home/trade_core/trade_core/loggers/logs

  trade-core:
    image: trade-core:test
    container_name: test-trade-core
    volumes:
      - ${HOME}/test-trade-core/logs:/home/trade_core/trade_core/loggers/logs

  trade-nginx:
    volumes:
      - ./testing/nginx.conf:/etc/nginx/conf.d/default.conf

networks:
  trade-network:
    name: test-trade-network

