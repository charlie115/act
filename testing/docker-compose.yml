version: '3'
services:
  trade-postgres:
    image: postgres:16rc1-alpine
    container_name: test-trade-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE_TRADE}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - $HOME/test-trade-postgres/data/:/var/lib/postgresql/data/
    ports:
      - "25432:5432"
    expose:
      - "5432"
    networks:
      - test-trade-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  trade-core-api:
    image: trade-core-api:test
    container_name: test-trade_core
    # ports: # ports are not needed as we are using nginx as a reverse proxy
    #   - "20081:20081" 
    expose:
      - "8000"
    volumes:
      - $HOME/test-trade-core/logs:/home/trade_core/trade_core/loggers/logs
    depends_on:
      trade-postgres:
        condition: service_healthy
    networks:
      - test-trade-network
    restart: always

  trade-core:
    image: trade-core:test
    container_name: test-trade_core
    volumes:
      - $HOME/test-trade-core/logs:/home/trade_core/trade_core/loggers/logs
    depends_on:
      trade-postgres:
        condition: service_healthy
    networks:
      - test-trade-network
    restart: always

  trade-nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "20081:20081"  # Expose port 20081 to the host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # Mount the Nginx config
    depends_on:
      - trade-core-api
    networks:
      - test-trade-network
    restart: always
  
networks:
  test-trade-network:
    driver: bridge