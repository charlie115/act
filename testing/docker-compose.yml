version: '3'
services:

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - $HOME/certbot/conf:/etc/letsencrypt
      - $HOME/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --force-renewal; sleep 12h & wait $${!}; done;'"

  nginx:
    image: community-nginx:test
    build:
      context: "nginx/"
    container_name: test-community-nginx
    volumes:
      - $HOME/test-community-web/build/:/opt/community_frontend/build/
      - $HOME/test-community-drf/static/:/opt/community_drf/static/
      - $HOME/test-community-drf/media/:/opt/community_drf/media/
      - $HOME/certbot/conf:/etc/letsencrypt
      - $HOME/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - drf
    networks:
      - test-community-network
    restart: always
  
  postgres:
    image: postgres:16rc1-alpine
    container_name: test-community-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE_COMMUNITY}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - $HOME/test-community-postgres/data/:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - test-community-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
  
  redis:
    image: redis:7-alpine
    container_name: test-community-redis
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - $HOME/test-community-redis/data/:/data/
      - $HOME/test-community-redis/conf/redis.conf:/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - test-community-network
    restart: always
  
  mongodb:
    image: mongo:6.0
    container_name: test-community-mongodb
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - $HOME/test-community-mongodb/data/:/data/
    ports:
      - "27017:27017"
    networks:
      - test-community-network
    restart: always

  drf:
    image: community-drf:test
    depends_on:
      postgres:
        condition: service_healthy
    container_name: test-community-drf
    volumes:
      - $HOME/test-community-drf/static:/opt/community_drf/static
      - $HOME/test-community-drf/media:/opt/community_drf/media
    expose:
      - "8000"
    networks:
      - test-community-network
    restart: always
  
  celery-worker:
    image: community-celery-worker:test
    command: celery -A config worker -l DEBUG
    container_name: test-community-celery-worker
    networks:
      - test-community-network
    restart: always
  
  celery-beat:
    image: community-celery-beat:test
    command: celery -A config beat -l DEBUG
    container_name: test-community-celery-beat
    networks:
      - test-community-network
    restart: always
  
  news-core:
    image: news-core:test
    container_name: test-news-core
    networks:
      - test-community-network
    restart: always
  
  info-core:
    image: info-core
    container_name: test-info-core
    networks:
      - test-community-network
    restart: always
  
networks:
  test-community-network:
    driver: bridge
