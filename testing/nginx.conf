upstream fastapi {
    server trade_core:8000;  # trade_core is the name of the FastAPI service in docker-compose
}

server {
    listen 20081;  # Listen on port 20081 as specified in docker-compose.yml

    # Restrict access to a specific IP address
    allow 221.148.128.212;  # Allow only this IP
    # deny all;  # Deny all other IPs

    location / {
        proxy_pass http://fastapi;  # Proxy pass to FastAPI upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}