upstream fastapi {
    server trade-core-api:8000;  # trade-core-api is the name of the FastAPI service in docker-compose
}

server {
    listen 20081;  # Listen on port 20081 as specified in docker-compose.yml

    # Restrict access to a specific IP address
    allow 221.148.128.212;  #
    allow 14.52.68.128; # CORE4
    allow 221.148.128.205; # CORE3
    allow 14.32.108.162; # office ip
    allow 14.52.18.150; # My Home ip
    allow 172.21.0.0/16;  # Allow entire Docker subnet
    allow 127.0.0.1;          # Loopback IP (optional)

    deny all;  # Deny all other IPs

    location / {
        proxy_pass http://fastapi;  # Proxy pass to FastAPI upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}