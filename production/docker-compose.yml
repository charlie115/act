version: '3'
services:
  postgres:
    image: postgres:16rc1-alpine
    container_name: trade-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE_TRADE}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - $HOME/trade-postgres/data/:/var/lib/postgresql/data/
    ports:
      - "25432:5432"
    expose:
      - "5432"
    networks:
      - trade-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  trade_core:
    build:
      context: "trade/"
    container_name: trade_core
    # ports:
    #   - "20081:20081"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trade-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "20081:20081"  # Expose port 20081 to the host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # Mount the Nginx config
    depends_on:
      - trade_core
    networks:
      - trade-network
    restart: always
  
networks:
  trade-network:
    driver: bridge